    <div class="card">

        <h3>专业大提琴交，扩张肛门极限</h3>

        <button class="likeBtn">点赞</button>

<style>
.attractions {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
    background: #222;
    color: white;
    border-radius: 5px;
}
</style>

<script>
    // 主题切换
    const toggle = document.getElementById('themeToggle');
    if (toggle) {
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
        });
    }

    const style = document.createElement('style');
    style.textContent = '.dark {background:#111; color:#eee;} .dark nav {background:#222;} .dark a {color:#ffec99}';
    document.head.appendChild(style);
</script>

<script>
    // ⭐ 点赞按钮 — 正确版本
    document.querySelectorAll('.likeBtn').forEach(btn => {
        btn.addEventListener('click', () => {
            btn.textContent = btn.textContent === "👍" ? "点赞" : "👍";
        });
    });
</script>
